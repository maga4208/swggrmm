workflows:
  ios-build:
    name: iOS Build
    environment:
      xcode: latest
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project swggrmm.xcodeproj \
            --scheme swggrmm
    artifacts:
      - build/ios/ipa/*.ipa
