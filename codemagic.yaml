workflows:
  ios-build:
    name: iOS Build
    environment:
      xcode: latest
    scripts:
      - name: Build app (unsigned)
        script: |
          xcodebuild -scheme swggrmm -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO SYMROOT=build build
      - name: Create IPA
        script: |
          mkdir -p build/ios/ipa
          mkdir -p Payload
          cp -r build/Release-iphoneos/swggrmm.app Payload/
          zip -r build/ios/ipa/swggrmm.ipa Payload/
    artifacts:
      - build/ios/ipa/*.ipa
